version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci

  build:
    commands:
      - npm run build --if-present
      - npm test -- --passWithNoTests

  post_build:
    commands:
      - echo "Build completed on $(date)"

artifacts:
  files:
    - "**/*"
  exclude-paths:
    - node_modules/**
    - "*.test.*"

cache:
  paths:
    - node_modules/**
